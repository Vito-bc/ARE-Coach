name: Bug Report
description: Something is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill out the fields below so we can reproduce and fix it.

  - type: input
    id: device
    attributes:
      label: Device & OS
      placeholder: "e.g. iPhone 15 / iOS 17.4 or Pixel 8 / Android 14"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "e.g. 1.3.0 (build 17)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: "Describe the bug clearly. Include steps to reproduce."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      placeholder: "Paste crash output or attach a screenshot."
